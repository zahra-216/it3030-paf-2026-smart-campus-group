# App name
spring.application.name=unidesk

# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Local config import (only loaded when local profile active and file exists)
spring.config.import=optional:classpath:application-local.properties

# Server port (Azure injects PORT env var)
server.port=${PORT:8081}

# Frontend URL (env var in prod, localhost fallback for dev)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Backend base URL (used to build OAuth redirect URIs)
app.backend-url=${BACKEND_URL:http://localhost:8081}

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Datasource — env vars on Azure, falls back to local file values
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${app.backend-url}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth?prompt=select_account

# GitHub OAuth
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=${app.backend-url}/login/oauth2/code/github
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize?prompt=consent